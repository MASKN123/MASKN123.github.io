<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✏️ EDIT: Change "Your Name" here, same as on the home page -->
  <title>Blog — Your Name</title>
  <meta name="description" content="Blog of Your Name — articles on AI, machine learning and data science.">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation (links point back to the home page sections) -->
  <header class="nav" id="top">
    <div class="nav__inner">
      <!-- ✏️ EDIT: Your name -->
      <a href="index.html" class="nav__logo"><span class="nav__logo-mark">&gt;_</span> Your Name</a>
      <nav class="nav__links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="index.html#projects">Projects</a>
        <a href="index.html#writing">Writing</a>
        <a href="blog.html">Blog</a>
        <a href="index.html#contact" class="nav__cta">Contact</a>
      </nav>
      <div class="nav__actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
        </button>
        <button class="nav__burger" id="navBurger" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container blog">
        <h1 class="section__title"><span class="section__num">//</span> Blog</h1>
        <p class="blog__intro">
          <!-- ✏️ EDIT: One sentence about what you write here -->
          Notes and articles on AI, machine learning and working with data.
        </p>

        <!-- Posts are listed here automatically from posts.js — nothing to edit below -->
        <div id="postList" class="blog__list">
          <p class="blog__empty">Loading posts…</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <!-- ✏️ EDIT: Your name -->
    <p>Designed &amp; built by <strong>Your Name</strong> · © <span id="year"></span></p>
  </footer>

  <script src="posts.js"></script>
  <script src="main.js"></script>
  <script>
    // Render the post list from posts.js (newest first)
    (function renderPostList() {
      const box = document.getElementById("postList");
      const posts = (window.POSTS || []).slice().sort((a, b) => b.date.localeCompare(a.date));
      if (posts.length === 0) {
        box.innerHTML = '<p class="blog__empty">No posts yet — check back soon!</p>';
        return;
      }
      box.innerHTML = posts.map(p => `
        <a class="post-item" href="post.html?p=${encodeURIComponent(p.slug)}">
          <span class="post-item__date">${formatDate(p.date)}</span>
          <h2 class="post-item__title">${escapeHtml(p.title)}</h2>
          <p class="post-item__summary">${escapeHtml(p.summary)}</p>
          <span class="post-item__read">Read post →</span>
        </a>`).join("");

      function formatDate(iso) {
        return new Date(iso + "T00:00:00").toLocaleDateString("en-GB",
          { day: "numeric", month: "long", year: "numeric" });
      }
      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      }
    })();
  </script>
</body>
</html>
