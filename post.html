  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <header class="nav" id="top">
    <div class="nav__inner">
      <!-- ✏️ EDIT: Your name -->
      <a href="index.html" class="nav__logo"><span class="nav__logo-mark">&gt;_</span> Your Name</a>
      <nav class="nav__links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="index.html#projects">Projects</a>
        <a href="index.html#writing">Writing</a>
        <a href="blog.html">Blog</a>
        <a href="index.html#contact" class="nav__cta">Contact</a>
      </nav>
      <div class="nav__actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
        </button>
        <button class="nav__burger" id="navBurger" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container post">
        <p><a class="post__back" href="blog.html">← All posts</a></p>
        <header class="post__header">
          <p class="post-item__date" id="postDate"></p>
          <h1 class="post__title" id="postTitle">Loading…</h1>
        </header>
        <article class="prose" id="postBody"></article>
      </div>
    </section>
  </main>

  <footer class="footer">
    <!-- ✏️ EDIT: Your name -->
    <p>Designed &amp; built by <strong>Your Name</strong> · © <span id="year"></span></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="posts.js"></script>
  <script src="main.js"></script>
  <script>
    // Load the post named in the URL (post.html?p=slug) — nothing to edit here
    (async function renderPost() {
      const titleEl = document.getElementById("postTitle");
      const dateEl = document.getElementById("postDate");
      const bodyEl = document.getElementById("postBody");

      const slug = new URLSearchParams(location.search).get("p");
      const post = (window.POSTS || []).find(p => p.slug === slug);
      if (!post) {
        titleEl.textContent = "Post not found";
        bodyEl.innerHTML = '<p>This post doesn\'t exist (or was removed). <a href="blog.html">Back to all posts</a>.</p>';
        return;
      }

      titleEl.textContent = post.title;
      document.title = post.title + " — Blog";
      dateEl.textContent = new Date(post.date + "T00:00:00").toLocaleDateString("en-GB",
        { day: "numeric", month: "long", year: "numeric" });

      try {
        const res = await fetch("post-" + post.slug + ".md");
        if (!res.ok) throw new Error(res.status);
        const md = await res.text();
        if (window.marked) {
          bodyEl.innerHTML = marked.parse(md);
        } else {
          const pre = document.createElement("pre");
          pre.textContent = md;
          bodyEl.appendChild(pre);
        }
      } catch (e) {
        bodyEl.innerHTML = "<p>Sorry, this post could not be loaded right now.</p>";
      }
    })();
  </script>
</body>
</html>
